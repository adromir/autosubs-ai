name: Build and Release Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., v1.2.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.flavor }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [cpu, cuda, rocm]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.flavor }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/autosubs-ai:${{ inputs.version }}-${{ matrix.flavor }}
            ghcr.io/${{ github.repository_owner }}/autosubs-ai:latest-${{ matrix.flavor }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/autosubs-ai:buildcache-${{ matrix.flavor }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/autosubs-ai:buildcache-${{ matrix.flavor }},mode=max

  create-release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: AutoSubs AI ${{ inputs.version }}
          body: |
            ## AutoSubs AI ${{ inputs.version }}
            
            ### Docker Containers Available
            You can pull the latest Docker images from the GitHub Container Registry:
            - **CPU**: `docker pull ghcr.io/${{ github.repository_owner }}/autosubs-ai:${{ inputs.version }}-cpu`
            - **CUDA**: `docker pull ghcr.io/${{ github.repository_owner }}/autosubs-ai:${{ inputs.version }}-cuda`
            - **ROCm**: `docker pull ghcr.io/${{ github.repository_owner }}/autosubs-ai:${{ inputs.version }}-rocm`
            
            Source code attached below.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
