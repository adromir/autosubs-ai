version: '3.8'

services:
  autosubs-rocm:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    profiles: ["rocm"]
    ports:
      - "8000:8000"
    environment:
      - TZ=UTC
      # The installer creates these automatically. If deploying directly via Docker, set them manually:
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=secret
      # - API_TOKEN=optional_static_key
    volumes:
      - .:/app/data
      # Map your media folders here:
      # - /mnt/user/movies:/movies
      # - /mnt/user/tvshows:/tv
      
      # Native ROCm on Linux mapping:
      # devices:
      #   - /dev/kfd:/dev/kfd
      #   - /dev/dri:/dev/dri

  autosubs-cuda:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    profiles: ["cuda"]
    ports:
      - "8000:8000"
    environment:
      - TZ=UTC
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=secret
    volumes:
      - .:/app/data
      # Map your media folders here:
      # - /mnt/user/movies:/movies
      # - /mnt/user/tvshows:/tv
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]


  autosubs-cpu:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    profiles: ["cpu"]
    ports:
      - "8000:8000"
    environment:
      - TZ=UTC
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=secret
    volumes:
      - .:/app/data
      # Map your media folders here:
      # - /mnt/user/movies:/movies
      # - /mnt/user/tvshows:/tv
